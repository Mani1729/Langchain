repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: check-ast
      - id: check-case-conflict
      - id: check-yaml
      - id: check-docstring-first

  - repo: local
    hooks:
      - id: autoflake
        name: autoflake
        entry: uv run autoflake --in-place --remove-all-unused-imports --remove-unused-variables
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: uv run isort --profile black
        language: system
        types: [python]

      - id: ruff
        name: ruff
        entry: uv run ruff check src --fix
        language: system
        types: [python]

      - id: black
        name: black
        entry: uv run black src
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy src --check-untyped-defs
        language: system
        types: [python]
        pass_filenames: false
